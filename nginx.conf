# ─────────────────────────────────────────────
#  nginx.conf  –  Configuración Nginx
#  Alternativa al .htaccess para servidores Nginx
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name tu-dominio.com;

    # Apuntar al directorio public/
    root /var/www/agenda-php/public;
    index index.php;

    # Charset
    charset utf-8;

    # Redirigir todo a index.php (equivalente al RewriteRule de Apache)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Procesar PHP con PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(env|git|htaccess) {
        deny all;
    }
    location ~ /(composer\.(json|lock)|vendor)/ {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/agenda-access.log;
    error_log  /var/log/nginx/agenda-error.log;
}
